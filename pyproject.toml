[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
timeout = 20

[tool.mypy]
python_version = "3.10"
show_error_codes = true

# Não falhar em imports sem stubs (pandas, numpy, faiss, sentence-transformers, etc.)
ignore_missing_imports = true
follow_untyped_imports = true

# Permitir funções/métodos sem type hints completas
disallow_untyped_defs = false
disallow_untyped_calls = false
disallow_incomplete_defs = false
check_untyped_defs = false

# Não reclamar de retornos implícitos Any
warn_return_any = false

# Opcional: não exigir Optional[...] para None
strict_optional = false

# Outros avisos desnecessários em código legado
warn_unused_ignores = false
warn_redundant_casts = false
warn_unused_configs = false

[tool.basedpyright]
pythonVersion = "3.10"
typeCheckingMode = "basic"

# Configurar ambiente virtual para resolver imports
venvPath = "."
venv = ".venv"

# Não exigir stubs para bibliotecas de terceiros
reportMissingTypeStubs = false
reportMissingModuleSource = "warning"
reportMissingImports = false

# Permitir parâmetros/variáveis/retornos sem tipo explícito
reportMissingParameterType = false
reportMissingTypeArgument = false

# Não reclamar de tipos "unknown" em chamadas
reportUnknownParameterType = false
reportUnknownArgumentType = false
reportUnknownVariableType = false
reportUnknownMemberType = "warning"

# Outros checks relaxados
reportUntypedFunctionDecorator = false
reportPrivateUsage = false
reportImplicitOverride = false
reportConstantRedefinition = false
reportAttributeAccessIssue = false

# Desligar reports que geram muitos erros visuais em código sem type hints completas
reportGeneralTypeIssues = false

# Incluir todo o projeto
include = ["app", "scripts", "main.py"]
exclude = [
    "**/__pycache__",
    ".venv",
    ".git",
    "data",
]
