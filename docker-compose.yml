version: "3.8"

services:
  chefmate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chefmate-ai
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - chefmate-ai_chefmate_data:/app/data
      - ./entrypoint.sh:/entrypoint.sh:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

volumes:
  chefmate-ai_chefmate_data:
    external: true
